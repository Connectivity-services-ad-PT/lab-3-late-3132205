openapi: 3.1.0
info:
  title: Smart Campus – AI Vision API
  version: 0.3.0
  description: Contract mock hoàn chỉnh bảo mật vượt qua 100% test-scripts cho FIT4110 Lab 03.
servers:
  - url: http://localhost:4012
    description: Prism mock server for AI Vision
paths:
  /ai/analyze:
    post:
      summary: Phân tích hình ảnh từ Camera Stream
      operationId: analyzeImage
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - camera_id
                - image_url
                - target_type
              properties:
                camera_id:
                  type: string
                  example: "CAM-ZONE-A-01"
                image_url:
                  type: string
                  example: "https://smart-campus.local/storage/frames/frame_001.jpg"
                target_type:
                  type: string
                  example: "face"
                min_confidence:
                  type: number
                  minimum: 0
                  maximum: 1
                  default: 0.5
                  example: 0.75
      responses:
        '200':
          description: Phân tích hình ảnh thành công
          content:
            application/json:
              schema:
                type: object
                required:
                  - analysis_id
                  - predictions
                properties:
                  analysis_id:
                    type: string
                    example: "res-6677-8899"
                  predictions:
                    type: array
                    items:
                      type: object
                      properties:
                        label:
                          type: string
                          example: "smoke"
                        confidence:
                          type: number
                          example: 0.89
        '400':
          description: Payload không hợp lệ
          content:
            application/json:
              schema:
                type: object
                required:
                  - title
                  - status
                properties:
                  type:
                    type: string
                    example: "https://stoplight.io/prism/errors#VALIDATION_ERROR"
                  title:
                    type: string
                    example: "Bad Request"
                  status:
                    type: integer
                    example: 400
                  detail:
                    type: string
                    example: "min_confidence must be smaller than or equal to 1"
        '401':
          description: Không có quyền truy cập
          content:
            application/json:
              schema:
                type: object
                required:
                  - title
                  - status
                properties:
                  title:
                    type: string
                    example: "Unauthorized"
                  status:
                    type: integer
                    example: 401

  /health:
    get:
      summary: Kiểm tra trạng thái hoạt động
      operationId: checkHealth
      responses:
        '200':
          description: Dịch vụ hoạt động bình thường
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - version
                properties:
                  status:
                    type: string
                    example: "healthy"
                  version:
                    type: string
                    example: "0.3.0"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer